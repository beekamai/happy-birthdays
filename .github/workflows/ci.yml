name: CI

# Validate every push to main and every PR: type-check both workspaces and
# confirm the frontend bundle builds. No tests/lint yet, so typecheck is the gate.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check (backend + frontend)
        run: bun run typecheck

      - name: Build frontend bundle
        run: bun run build

      - name: Verify build output
        run: test -f backend/dist/index.html
