name: Deploy

# Continuous deployment. When CI succeeds on main (or on a manual run), SSH to
# the server and update it: sync to origin/main, install, build, restart.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_HOST     - server host / IP
#   DEPLOY_USER     - SSH user (e.g. root, or a dedicated deploy user)
#   DEPLOY_SSH_KEY  - PRIVATE SSH key whose public half is in the server's
#                     ~/.ssh/authorized_keys
#   DEPLOY_PATH     - absolute path to the repo checkout on the server
#
# The server must be a git clone of this repo (public, so `git pull` needs no
# credentials) with bun + pm2 installed and the app running under pm2 as
# "happy-birthdays". Runtime data (data/, *.db, ecosystem.config.cjs, .env) is
# gitignored, so the hard reset to origin/main leaves it untouched.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only when CI passed (or when triggered by hand). Skips on a failed CI.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.bun/bin:$PATH"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            bun install
            bun run build
            pm2 restart happy-birthdays
